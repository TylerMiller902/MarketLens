<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketLens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080e;--bg2:#0f0f18;--bg3:#171722;--bg4:#1e1e2c;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.25);
  --tx:#eeeef8;--mu:#7e7e96;--di:#45455a;
  --P:#7c6af7;--Pbg:rgba(124,106,247,.12);--P2:#b0a0ff;
  --G:#22c55e;--Gbg:rgba(34,197,94,.10);
  --B:#3b82f6;--Bbg:rgba(59,130,246,.10);
  --R:#ef4444;--Rbg:rgba(239,68,68,.10);
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px}
button,input{font-family:var(--fb)}

/* FULLSCREEN MODAL */
#fs-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(8,8,14,.97);backdrop-filter:blur(10px);flex-direction:column}
#fs-modal.open{display:flex}
.fs-topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.2rem;border-bottom:1px solid var(--b2);flex-shrink:0;flex-wrap:wrap;gap:8px}
.fs-title{font-family:var(--fd);font-size:1rem;font-weight:700}
.fs-sub{font-size:11px;color:var(--mu);font-family:var(--fm);margin-top:2px}
.fs-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fsp-btn{background:transparent;border:1px solid var(--b2);color:var(--mu);padding:4px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-family:var(--fm)}
.fsp-btn.on{background:var(--P);border-color:var(--P);color:#fff}
.fs-close{background:var(--bg3);border:1px solid var(--b2);color:var(--mu);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:12px}
.fs-close:hover{color:var(--tx);border-color:var(--P)}
.fs-perf{font-family:var(--fm);font-size:13px;font-weight:500}
.fs-perf.up{color:var(--G)}.fs-perf.dn{color:var(--R)}
.fs-body{flex:1;padding:1rem 1.2rem;display:flex;flex-direction:column;min-height:0}
.fs-chart-wrap{flex:1;position:relative;min-height:0}
.fs-info{display:flex;gap:1.2rem;padding-top:.75rem;flex-shrink:0;flex-wrap:wrap}
.fs-info-item{display:flex;flex-direction:column;gap:2px}
.fs-info-lbl{font-size:10px;color:var(--di);font-family:var(--fm);text-transform:uppercase;letter-spacing:.08em}
.fs-info-val{font-size:13px;font-family:var(--fm)}

/* NAV */
#nav{background:var(--bg2);border-bottom:1px solid var(--b2);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.brand{font-family:var(--fd);font-size:13px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--P2)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--G);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-live{font-size:11px;font-family:var(--fm);color:var(--G);display:flex;align-items:center;gap:5px}
.nav-pills{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.mpill{font-size:11px;font-family:var(--fm);color:var(--mu)}
.mpill.up{color:var(--G)}.mpill.dn{color:var(--R)}

/* ═══════════════════════════════════════════
   HOME — Full screen terminal
═══════════════════════════════════════════ */
#home{
  min-height:calc(100vh - 42px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 2rem;text-align:center;
  position:relative;
}
#home::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 45%,rgba(124,106,247,.15) 0%,transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 20%,rgba(34,197,94,.05) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 80%,rgba(59,130,246,.05) 0%,transparent 60%);
  pointer-events:none;
}
/* Grid lines background */
#home::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}
.home-inner{position:relative;z-index:1;width:100%;max-width:680px;display:flex;flex-direction:column;align-items:center}
.headline{
  font-family:var(--fd);
  font-size:clamp(3rem,8vw,5.5rem);
  font-weight:800;line-height:1;letter-spacing:-.04em;
  margin-bottom:1rem;
}
.headline em{color:var(--P2);font-style:normal;display:block}
.home-sub{color:var(--mu);font-size:1rem;margin-bottom:2.5rem;font-weight:300;letter-spacing:.02em}

/* MOVERS BUBBLE */
.movers-wrap{position:absolute;top:1.2rem;right:1.2rem;z-index:10;text-align:right}
.movers-bubble{
  background:var(--bg3);border:1px solid var(--b2);
  color:var(--tx);padding:8px 14px;border-radius:20px;
  cursor:pointer;font-size:12px;font-family:var(--fm);
  display:flex;align-items:center;gap:6px;
  transition:border-color .15s,background .15s;white-space:nowrap;
}
.movers-bubble:hover{border-color:var(--P);background:var(--Pbg)}
.movers-bubble .dot{width:6px;height:6px;border-radius:50%;background:var(--G);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
.movers-panel{
  margin-top:8px;background:var(--bg2);border:1px solid var(--b2);
  border-radius:14px;overflow:hidden;width:300px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.movers-header{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--b1);font-size:11px;font-family:var(--fm);color:var(--di)}

.mover-item{
  display:flex;
  align-items:center;
  padding:8px 14px;
  border-bottom:1px solid var(--b1);
  cursor:pointer;
  transition:background .12s;
  opacity:0;
  transform:translateX(10px);
  animation:slideIn .3s forwards;
}

.mover-item:last-child{
  border-bottom:none;
}

.mover-item:hover{
  background:var(--bg3);
}

@keyframes slideIn{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

.mover-rank{
  font-family:var(--fm);
  font-size:10px;
  color:var(--di);
  width:18px;
  flex-shrink:0;
}

.mover-ticker{
  font-family:var(--fm);
  font-size:12px;
  font-weight:600;
  width:60px;
  flex-shrink:0;
}

.mover-ticker.up{color:var(--G)}
.mover-ticker.dn{color:var(--R)}

.mover-name{
  font-size:11px;
  color:var(--mu);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  padding-right:10px;
}

.mover-pct{
  font-family:var(--fm);
  font-size:12px;
  font-weight:600;
  margin-left:auto;
  width:58px;
  text-align:right;
  flex-shrink:0;
}

.mover-pct.up{color:var(--G)}
.mover-pct.dn{color:var(--R)}

/* CHIPS — customizable with logos and returns */
.chips-section{width:100%;max-width:720px;margin-bottom:1.8rem}
.chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.chip-wrap{position:relative}
.chip{
  background:var(--bg3);border:1px solid var(--b2);border-radius:20px;
  padding:5px 11px 5px 7px;font-size:12px;font-family:var(--fm);
  cursor:pointer;color:var(--mu);transition:border-color .15s,color .15s,background .15s;
  user-select:none;position:relative;overflow:hidden;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.chip:hover{border-color:var(--P);color:var(--P2);background:var(--Pbg)}
.chip-logo-img{width:16px;height:16px;border-radius:3px;object-fit:contain;flex-shrink:0}
.chip-sym{font-weight:500;color:inherit}
.chip-name{color:var(--di);font-size:11px}
.chip-ret{font-size:10px;font-family:var(--fm);flex-shrink:0}
.chip-ret.up{color:var(--G)}.chip-ret.dn{color:var(--R)}
/* Delete progress bar */
.chip::after{content:'';position:absolute;bottom:0;left:0;height:2px;width:0;background:var(--R);border-radius:1px;transition:none;}
/* Phase 1: purple hover (2s) */
.chip.hover-purple{border-color:var(--P)!important;color:var(--P2)!important;background:var(--Pbg)!important}
/* Phase 2: red + countdown bar */
.chip.deleting{border-color:var(--R)!important;color:var(--R)!important;background:var(--Rbg)!important}
.chip.deleting::after{width:100%;transition:width 3s linear}
/* Add chip button */
.chip-add{background:transparent;border:1px dashed var(--b3);border-radius:20px;padding:5px 12px;font-size:12px;font-family:var(--fm);cursor:pointer;color:var(--di);transition:all .15s;display:flex;align-items:center;gap:4px;}
.chip-add:hover{border-color:var(--P);color:var(--P2)}
.chip-input-wrap{display:none;align-items:center;gap:6px;background:var(--bg3);border:1.5px solid var(--P);border-radius:20px;padding:4px 4px 4px 12px;}
.chip-input-wrap.open{display:flex}
.chip-inp{background:transparent;border:none;color:var(--tx);font-family:var(--fm);font-size:12px;width:80px;outline:none;text-transform:uppercase;}
.chip-inp::placeholder{color:var(--di);text-transform:none}
.chip-inp-go{background:var(--P);border:none;color:#fff;border-radius:14px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:600}

/* SEARCH */
.search-row{display:flex;gap:8px;width:100%;max-width:500px;position:relative}
.sinp{width:100%;background:var(--bg3);border:1.5px solid var(--b2);border-radius:12px;padding:.9rem 1.1rem;font-size:.95rem;color:var(--tx);outline:none;transition:border-color .2s}
.sinp:focus{border-color:var(--P)}
.sinp::placeholder{color:var(--di)}
.gobtn{background:var(--P);border:none;color:#fff;padding:.9rem 1.4rem;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--fd)}
.gobtn:hover{opacity:.85}
.sugg-wrap{position:absolute;top:calc(100%+8px);left:0;right:0;background:var(--bg3);border:1.5px solid var(--b2);border-radius:10px;overflow:hidden;z-index:500;display:none;box-shadow:0 12px 32px rgba(0,0,0,.7);min-width:200px}
.sugg-wrap.open{display:block}
.sugg-wrap.chip-sugg{min-width:220px}
.sugg-item{display:flex;align-items:center;gap:8px;padding:.35rem .75rem;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .1s}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover{background:var(--bg4)}
.sugg-logo{width:20px;height:20px;border-radius:4px;object-fit:contain;flex-shrink:0;background:var(--bg4);padding:2px}
.sugg-info{flex:1;min-width:0}
.sugg-sym{font-family:var(--fm);font-size:11px;color:var(--P2);font-weight:600}
.sugg-name{font-size:10px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.sugg-right{text-align:right;flex-shrink:0}
.sugg-price{font-family:var(--fm);font-size:11px;font-weight:500}
.sugg-chg{font-size:10px;font-family:var(--fm)}
.sugg-chg.up{color:var(--G)}.sugg-chg.dn{color:var(--R)}

/* STOCK PAGE */
#spage{display:none;padding-bottom:50px}
#spage.on{display:block}
#home.gone{display:none}
.shead{padding:.75rem 1.2rem;border-bottom:1px solid var(--b1);background:var(--bg2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.backbtn{background:var(--bg3);border:1px solid var(--b2);color:var(--mu);padding:.3rem .75rem;border-radius:8px;cursor:pointer;font-size:12px}
.backbtn:hover{color:var(--tx);border-color:var(--P)}
.shead-swrap{position:relative;flex:1;max-width:280px}
.shead-sinp{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:.32rem .75rem .32rem 1.8rem;font-size:12px;color:var(--tx);outline:none}
.shead-sinp:focus{border-color:var(--P)}
.shead-sinp::placeholder{color:var(--di)}
.shead-sico{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--di);font-size:12px;pointer-events:none}
.shead-gobtn{background:var(--P);border:none;color:#fff;padding:.32rem .8rem;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.scontent{padding:.9rem 1rem;max-width:1200px;margin:0 auto}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.loading-ring{width:40px;height:40px;border:3px solid var(--b2);border-top-color:var(--P);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--mu);font-family:var(--fm)}

/* STOCK HEADER */
.shdr{display:flex;gap:.75rem;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap}
.slogo{width:48px;height:48px;border-radius:10px;background:var(--bg3);border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.slogo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:4px}
.stitle{flex:1;min-width:150px}
.sname{font-family:var(--fd);font-size:1.4rem;font-weight:800;letter-spacing:-.02em}
.smeta{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.stk{font-family:var(--fm);font-size:10px;color:var(--P2);background:var(--Pbg);padding:2px 6px;border-radius:4px}
.sexch,.ssect{font-size:11px;color:var(--mu)}
.etfbadge{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--Bbg);color:var(--B);font-family:var(--fm)}
.sprice{text-align:right;flex-shrink:0}
.bigp{font-family:var(--fd);font-size:1.9rem;font-weight:800;letter-spacing:-.03em}
.pchg{font-family:var(--fm);font-size:12px;margin-top:2px}
.pchg.up{color:var(--G)}.pchg.dn{color:var(--R)}
.ohlc{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
.ohlci{display:flex;flex-direction:column;gap:1px}
.ohlcl{font-size:9px;color:var(--di);font-family:var(--fm);text-transform:uppercase;letter-spacing:.08em}
.ohlcv{font-size:11px;font-family:var(--fm)}

/* SECTIONS */
.stitle-sm{font-family:var(--fd);font-size:.56rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--di);margin-bottom:.5rem;margin-top:.1rem}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:.85rem 1rem;margin-bottom:.9rem}
.badge{font-size:9px;font-family:var(--fm);padding:2px 5px;border-radius:3px;margin-left:4px;background:var(--Pbg);color:var(--P2);vertical-align:middle}
.badge.live{background:var(--Gbg);color:var(--G)}
.badge.est{background:var(--Bbg);color:var(--B)}

/* PRICE CHART */
.chart-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;flex-wrap:wrap;gap:6px}
.pcperf{font-family:var(--fm);font-size:12px;font-weight:500}
.pcperf.up{color:var(--G)}.pcperf.dn{color:var(--R)}
.ranges{display:flex;gap:3px}
.rbtn{background:transparent;border:1px solid var(--b1);color:var(--mu);padding:3px 9px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--fm)}
.rbtn.on{background:var(--P);border-color:var(--P);color:#fff}
.cwrap{height:260px;position:relative}

/* 52W SLIDER */
.week52-card{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:.75rem 1rem;margin-bottom:6px}
.w52-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.w52-label{font-size:10px;color:var(--mu);font-family:var(--fm);text-transform:uppercase;letter-spacing:.08em}
.w52-pct{font-size:10px;font-family:var(--fm);color:var(--mu)}
.w52-track{position:relative;height:5px;background:var(--bg4);border-radius:3px;margin-bottom:.5rem}
.w52-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--B),var(--P))}
.w52-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--tx);border:2px solid var(--P);box-shadow:0 0 0 3px rgba(124,106,247,.25)}
.w52-price-label{position:absolute;bottom:14px;transform:translateX(-50%);font-size:10px;font-family:var(--fm);font-weight:500;color:var(--P2);white-space:nowrap;background:var(--bg3);padding:1px 5px;border-radius:3px;border:1px solid var(--b2)}
.w52-endpoints{display:flex;justify-content:space-between}
.w52-end{display:flex;flex-direction:column;gap:1px}
.w52-end-lbl{font-size:9px;color:var(--di);font-family:var(--fm);text-transform:uppercase;letter-spacing:.08em}
.w52-end-val{font-size:12px;font-family:var(--fm);font-weight:500}
.w52-end-val.low{color:var(--R)}.w52-end-val.high{color:var(--G)}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.9rem}
.scard{background:var(--bg2);border:1px solid var(--b1);border-radius:9px;padding:.6rem .8rem}
.scl{font-size:10px;color:var(--mu);font-family:var(--fm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.scv{font-size:.95rem;font-weight:600;font-family:var(--fd)}
@media(max-width:680px){.sgrid{grid-template-columns:repeat(2,1fr)}}

/* COMPETITORS */
.peers-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:.9rem;align-items:stretch}
@media(max-width:900px){.peers-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:560px){.peers-grid{grid-template-columns:repeat(2,1fr)}}
.peer-card{background:var(--bg2);border:1px solid var(--b1);border-radius:11px;padding:.75rem;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;justify-content:space-between;height:130px;overflow:hidden}
.peer-card:hover{border-color:var(--P)}
.peer-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.peer-logo{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--b2);overflow:hidden;position:relative;flex-shrink:0}
.peer-logo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:3px}
.peer-ticker{font-family:var(--fm);font-size:12px;color:var(--P2);font-weight:600;white-space:nowrap}
.peer-name{font-size:10px;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;width:100%;margin-bottom:auto;padding-bottom:8px}
.peer-bottom{display:flex;flex-direction:column;gap:3px}
.peer-price-row{display:flex;align-items:center;justify-content:space-between}
.peer-px{font-family:var(--fd);font-size:.95rem;font-weight:700}
.peer-chg{font-size:11px;font-family:var(--fm);font-weight:500}
.peer-chg.up{color:var(--G)}.peer-chg.dn{color:var(--R)}
.peer-dollar{font-size:10px;font-family:var(--fm)}
.peer-dollar.up{color:var(--G)}.peer-dollar.dn{color:var(--R)}
.peer-cap{font-size:10px;color:var(--di);font-family:var(--fm)}

/* ANALYST */
.analyst-grid{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:.75rem}
.cons-block{text-align:center;flex-shrink:0}
.cons-lbl{font-size:10px;color:var(--mu);font-family:var(--fm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.cons-pill{display:inline-block;font-family:var(--fd);font-size:.9rem;font-weight:700;padding:5px 14px;border-radius:8px;margin-bottom:4px}
.cons-pill.buy{background:var(--Gbg);color:var(--G)}
.cons-pill.hold{background:var(--Bbg);color:var(--B)}
.cons-pill.sell{background:var(--Rbg);color:var(--R)}
.cons-sub{font-size:11px;color:var(--mu);font-family:var(--fm)}
.tgt-block{flex:1;min-width:130px}
.tgt-lbl{font-size:10px;color:var(--mu);font-family:var(--fm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.tgt-val{font-family:var(--fd);font-size:1.4rem;font-weight:800;margin-bottom:2px}
.tgt-up{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;margin-left:5px;font-family:var(--fm)}

<script>
const API='https://marketlens-production-031f.up.railway.app';

const $  = id=>document.getElementById(id);
const esc= s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const f$ = (n,dp=2)=>n!=null&&!isNaN(n)&&n!==''?`$${Number(n).toFixed(dp)}`:'—';
const fB = n=>{if(n==null||isNaN(n))return'—';const x=Number(n);return x>=1e12?`$${(x/1e12).toFixed(2)}T`:x>=1e9?`$${(x/1e9).toFixed(2)}B`:x>=1e6?`$${(x/1e6).toFixed(2)}M`:'—'};
const fP = (n,dp=2)=>n!=null&&!isNaN(n)&&n!==''?`${Number(n).toFixed(dp)}%`:'—';
const fN = (n,dp=2)=>n!=null&&!isNaN(n)&&n!==''?Number(n).toFixed(dp):'—';
const sgn= n=>n>0?'+':'';
const rgba=(h,a)=>{try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}catch{return h}};
const fmtV=n=>{if(!n&&n!==0)return'—';const x=Math.abs(n);return x>=1e9?`$${(x/1e9).toFixed(2)}B`:x>=1e6?`$${(x/1e6).toFixed(1)}M`:`$${x.toFixed(0)}`};
const P='#7c6af7',G='#22c55e',B='#3b82f6',R='#ef4444';
const DCOLS=[P,G,B,R,'#a78bfa','#4ade80','#60a5fa'];
const last =a=>a?.length?a[a.length-1]:null;
const pctG =a=>a.map((v,i)=>i===0?null:a[i-1]&&Math.abs(a[i-1])>.0001?+((v-a[i-1])/Math.abs(a[i-1])*100).toFixed(2):null);
const today=()=>new Date().toISOString().slice(0,10);
const ETFS=['SPY','QQQ','IVV','VOO','VTI','EFA','AGG','GLD','VNQ','ARKK','VGT','XLF','XLE','VWO','DIA','IWM','BND','TLT','GDX','SLV'];

Chart.defaults.color='#7e7e96';
Chart.defaults.borderColor='rgba(255,255,255,0.05)';
Chart.defaults.font.family='DM Mono';
Chart.defaults.font.size=10;

let PriceChart=null,EarnLineChart=null,EarnBarChart=null,FSChart=null,ETFChart=null,Charts={};
let CurD=null,CurPH=null,CurDates=null,CurFMP=null,CurInsiders=null,CurETFInfo=null,CurPR='1Y',CurGP=10;
let searchTimer=null,holdTimers={};

// ══════════════════════════════════════════════════════════
//  CUSTOMIZABLE CHIPS
// ══════════════════════════════════════════════════════════
const DEFAULT_CHIPS=[
  {t:'AAPL',l:'Apple'},{t:'MSFT',l:'Microsoft'},{t:'NVDA',l:'Nvidia'},
  {t:'TSLA',l:'Tesla'},{t:'GOOGL',l:'Alphabet'},{t:'AMZN',l:'Amazon'},
  {t:'META',l:'Meta'},{t:'SPY',l:'S&P 500 ETF'},{t:'QQQ',l:'Nasdaq ETF'},
  {t:'BRK.B',l:'Berkshire'},{t:'KO',l:'Coca-Cola'},{t:'JNJ',l:'J&J'},
];
function loadChips(){try{const s=localStorage.getItem('ml-chips');return s?JSON.parse(s):DEFAULT_CHIPS;}catch{return DEFAULT_CHIPS;}}
function saveChips(c){try{localStorage.setItem('ml-chips',JSON.stringify(c));}catch{}}

function renderChips(){
  const chips=loadChips();
  const c=$('chips-container');
  if(!c)return;
  c.innerHTML=chips.map(ch=>`
    <div class="chip-wrap" data-t="${esc(ch.t)}">
      <span class="chip" data-t="${esc(ch.t)}">
        <img class="chip-logo-img" src="https://images.financialmodelingprep.com/symbol/${esc(ch.t)}.png" onerror="this.style.display='none'"/>
        <span class="chip-sym">${esc(ch.t)}</span>
        <span class="chip-name">· ${esc(ch.l)}</span>
        <span class="chip-ret" id="cret-${esc(ch.t)}"></span>
      </span>
    </div>`).join('');

  c.querySelectorAll('.chip').forEach(el=>{
    const ticker=el.dataset.t;
    el.addEventListener('click',()=>go(ticker));
    // Phase 1: 2s purple, then Phase 2: 3s red countdown
    el.addEventListener('mouseenter',()=>{
      el.classList.add('hover-purple');
      holdTimers[ticker]=setTimeout(()=>{
        el.classList.remove('hover-purple');
        el.classList.add('deleting');
        holdTimers[ticker+'_r']=setTimeout(()=>{
          const arr=loadChips().filter(x=>x.t!==ticker);
          saveChips(arr);renderChips();
        },3000);
      },2000);
    });
    el.addEventListener('mouseleave',()=>{
      el.classList.remove('hover-purple','deleting');
      clearTimeout(holdTimers[ticker]);
      clearTimeout(holdTimers[ticker+'_r']);
    });
  });

  // Load day returns async for each chip
  chips.forEach(ch=>{
    apiFetch(`/api/quote/${ch.t}`).then(q=>{
      const el=document.getElementById(`cret-${ch.t}`);
      if(!el||q?.dp==null)return;
      const up=q.dp>=0;
      el.textContent=`${up?'▲':'▼'}${Math.abs(q.dp).toFixed(2)}%`;
      el.className=`chip-ret ${up?'up':'dn'}`;
    }).catch(()=>{});
  });
}

// Add chip
$('chip-add-btn').addEventListener('click',()=>{
  $('chip-input-wrap').classList.toggle('open');
  if($('chip-input-wrap').classList.contains('open'))$('chip-inp').focus();
});
async function tryAddChip(){
  const val=$('chip-inp').value.trim().toUpperCase();
  if(!val)return;
  const chips=loadChips();
  if(chips.find(c=>c.t===val)){$('chip-inp').value='';$('chip-input-wrap').classList.remove('open');return;}
  // Quick lookup to get company name
  try{
    const d=await apiFetch(`/api/quote/${val}`);
    const name=d?.c?val:val; // use ticker as fallback label
    // Try to get proper name from search
    const s=await apiFetch(`/api/search?q=${encodeURIComponent(val)}`);
    const match=(s?.result||[]).find(r=>r.symbol===val);
    chips.push({t:val,l:match?.description||val});
    saveChips(chips);
    renderChips();
  }catch{chips.push({t:val,l:val});saveChips(chips);renderChips();}
  $('chip-inp').value='';$('chip-input-wrap').classList.remove('open');
}
// Chip input autocomplete
$('chip-inp-go').addEventListener('click',tryAddChip);
$('chip-inp').addEventListener('keydown',e=>{if(e.key==='Enter')tryAddChip();if(e.key==='Escape'){$('chip-input-wrap').classList.remove('open');$('chip-sugg').classList.remove('open');}});
$('chip-inp').addEventListener('input',()=>{
  const q=$('chip-inp').value.trim();
  const sugg=$('chip-sugg');
  if(!q||q.length<1){sugg.classList.remove('open');return;}
  const local=localSearch(q);
  if(!local.length){sugg.classList.remove('open');return;}
  sugg.innerHTML=local.map(it=>`
    <div class="sugg-item" data-sym="${esc(it.symbol)}" data-name="${esc(it.description)}">
      <img class="sugg-logo" src="https://images.financialmodelingprep.com/symbol/${esc(it.symbol)}.png" onerror="this.style.display='none'"/>
      <div class="sugg-info">
        <span class="sugg-sym">${esc(it.symbol)}</span>
        <span class="sugg-name">${esc(it.description)}</span>
      </div>
    </div>`).join('');
  sugg.querySelectorAll('.sugg-item').forEach(el=>el.addEventListener('click',()=>{
    const t=el.dataset.sym, n=el.dataset.name;
    sugg.classList.remove('open');
    $('chip-inp').value='';
    $('chip-input-wrap').classList.remove('open');
    const chips=loadChips();
    if(!chips.find(c=>c.t===t)){chips.push({t,l:n});saveChips(chips);renderChips();}
  }));
  sugg.classList.add('open');
});
document.addEventListener('click',e=>{
  const sugg=$('chip-sugg');
  if(sugg&&!$('chip-inp').contains(e.target)&&!sugg.contains(e.target))sugg.classList.remove('open');
});
renderChips();

// ══════════════════════════════════════════════════════════
//  TOP MOVERS BUBBLE
// ══════════════════════════════════════════════════════════
let moversLoaded=false;
$('movers-btn').addEventListener('click',async()=>{
  const panel=$('movers-panel');

function localSearch(q){
  const ql=q.toLowerCase();
  return LOCAL_STOCKS.filter(([s,n])=>
    s.toLowerCase().startsWith(ql)||n.toLowerCase().startsWith(ql)||n.toLowerCase().includes(ql)
  ).slice(0,5).map(([s,n])=>({symbol:s,description:n}));
}

function showSuggestions(items,sugg){
  sugg.innerHTML=items.map(it=>`
    <div class="sugg-item" data-sym="${esc(it.symbol)}">
      <img class="sugg-logo" src="https://images.financialmodelingprep.com/symbol/${esc(it.symbol)}.png" onerror="this.style.display='none'"/>
      <div class="sugg-info">
        <span class="sugg-sym">${esc(it.symbol)}</span>
        <span class="sugg-name">${esc(it.description||it.symbol)}</span>
      </div>
      <div class="sugg-right" id="sqr-${esc(it.symbol)}"></div>
    </div>`).join('');
  sugg.querySelectorAll('.sugg-item').forEach(el=>el.addEventListener('click',()=>{go(el.dataset.sym);sugg.classList.remove('open');}));
  sugg.classList.add('open');
  // Load quotes async
  items.forEach(it=>{
    apiFetch(`/api/quote/${it.symbol}`).then(qt=>{
      const el=document.getElementById(`sqr-${it.symbol}`);
      if(!el||!qt?.c)return;
      const up=(qt.dp||0)>=0;
      el.innerHTML=`<div class="sugg-price">${f$(qt.c)}</div><div class="sugg-chg ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(qt.dp||0).toFixed(2)}%</div>`;
    }).catch(()=>{});
  });
}

function setupSearch(inp,sugg){
  inp.addEventListener('input',()=>{
    clearTimeout(searchTimer);
    if(sugg)sugg.classList.remove('open');
    const q=inp.value.trim();
    if(!q||q.length<1||!sugg)return;
    // Show local results instantly
    const local=localSearch(q);
    if(local.length)showSuggestions(local,sugg);
    // Then enhance with FMP search after debounce
    searchTimer=setTimeout(async()=>{
      try{
        const d=await apiFetch(`/api/search?q=${encodeURIComponent(q)}`);
        const fmpItems=(d?.result||[]).filter(r=>r.symbol&&!r.symbol.match(/\.[A-Z]{2,}$/)).slice(0,5);
        if(!fmpItems.length)return;
        const localSyms=new Set(local.map(r=>r.symbol));
        const extra=fmpItems.filter(r=>!localSyms.has(r.symbol));
        const combined=[...local,...extra].slice(0,5);
        if(extra.length)showSuggestions(combined,sugg);
      }catch{}
    },300);
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=inp.value.trim().toUpperCase();if(v)go(v);}if(e.key==='Escape'&&sugg)sugg.classList.remove('open');});
  document.addEventListener('click',e=>{if(sugg&&!inp.contains(e.target)&&!sugg.contains(e.target))sugg.classList.remove('open');});
}

function generatePriceHistory(price,w52h,w52l,beta){
  const vol=(beta||1.0)*0.018,hi=w52h||price*1.15,lo=w52l||price*0.85;
  const mid=(hi+lo)/2,drift=(price-mid)/mid/252;
  function gen(n,sp){let p=price*sp;const a=[];for(let i=0;i<n;i++){p*=1+(Math.random()-.47)*vol+drift;p=Math.max(lo*.9,Math.min(hi*1.1,p));a.push(+p.toFixed(2));}a[a.length-1]=price;return a;}
  function genDates(n){const a=[];const now=new Date();for(let i=n;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);if(d.getDay()!==0&&d.getDay()!==6)a.push(d.toISOString().slice(0,10));}return a.slice(-n);}
  return{prices:{'1M':gen(22,.98),'3M':gen(63,.93),'6M':gen(126,.88),'1Y':gen(252,.78),'5Y':gen(260,.50)},dates:{'1M':genDates(22),'3M':genDates(63),'6M':genDates(126),'1Y':genDates(252),'5Y':genDates(260)}};
}

async function loadStock(ticker){
  $('scontent').innerHTML=`<div class="loading-wrap"><div class="loading-ring"></div><div class="loading-txt">Loading ${esc(ticker)}…</div></div>`;
  try{
    // Always fetch all data; determine isETF from profile.isEtf (most reliable)
    const [stock,fmpPrices,fmpFin,insiders]=await Promise.all([
      apiFetch(`/api/stock/${ticker}?etf=1`),
      apiFetch(`/api/fmp/prices/${ticker}`).catch(()=>({})),
      apiFetch(`/api/fmp/financials/${ticker}`).catch(()=>null),
      apiFetch(`/api/fmp/insiders/${ticker}`).catch(()=>null),
    ]);

    // Use FMP's own isEtf flag — catches every ETF regardless of ticker format
    const isETF = stock?.profile?.isEtf === true || ETFS.includes(ticker);

    CurD={...stock,ticker,isETF};
    CurFMP=fmpFin;
    CurInsiders=insiders;
    CurETFInfo=null;

    const m=stock?.metrics?.metric||{};
    const price=stock?.quote?.c;
    const hasFMPPrices=fmpPrices&&Object.values(fmpPrices).some(r=>r?.prices?.length>2);
    if(hasFMPPrices){
      CurPH={};CurDates={};
      for(const r of['1M','3M','6M','1Y','5Y']){CurPH[r]=fmpPrices[r]?.prices||[];CurDates[r]=fmpPrices[r]?.dates||[];}
      CurD.priceDataSource='live';
    }else{
      const gen=generatePriceHistory(price,m['52WeekHigh'],m['52WeekLow'],m.beta);
      CurPH=gen.prices;CurDates=gen.dates;
      CurD.priceDataSource='estimated';
    }
    renderPage();
    loadPeers(ticker);
  }catch(e){
    $('scontent').innerHTML=`<div class="not-found"><h3>Could not load ${esc(ticker)}</h3><p>${e.message}</p></div>`;
  }
}

function build52W(price,low,high){
  if(!low||!high||!price)return'';
  const pct=Math.max(0,Math.min(100,((price-low)/(high-low))*100));
  return`<div class="week52-card" style="grid-column:1/-1">
    <div class="w52-header"><span class="w52-label">52-Week Range</span><span class="w52-pct">${pct.toFixed(2)}% from low · ${(100-pct).toFixed(2)}% from high</span></div>
    <div class="w52-track">
      <div class="w52-fill" style="width:${pct}%"></div>
      <div class="w52-price-label" style="left:${pct}%">${f$(price)}</div>
      <div class="w52-thumb" style="left:${pct}%"></div>
    </div>
    <div class="w52-endpoints">
      <div class="w52-end"><div class="w52-end-lbl">52W Low</div><div class="w52-end-val low">${f$(low)}</div></div>
      <div class="w52-end"><div class="w52-end-lbl">52W High</div><div class="w52-end-val high">${f$(high)}</div></div>
    </div>
  </div>`;
}
function buildFinTable(rows,years){
  if(!rows?.length||!years?.length)return'<p style="padding:1rem;color:var(--mu);font-size:12px">No data.</p>';
  return`<table class="ftbl"><thead><tr><th style="text-align:left">Metric</th>${years.map(y=>`<th>${esc(y)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.l)}</td>${r.vals.map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function formatDateLabel(d,r){if(!d)return"";const dt=new Date(d+"T12:00:00");if(r==="1M"||r==="3M"||r==="6M")return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});if(r==="1Y")return dt.toLocaleDateString("en-US",{month:"short",year:"2-digit"});return dt.getFullYear().toString();}

function drawPrice(r){
  CurPR=r;const prices=CurPH?.[r]||[];const rawDates=CurDates?.[r]||[];
  if(PriceChart){PriceChart.destroy();PriceChart=null;}
  const canvas=$("pc");if(!canvas)return;
  if(!prices.length){canvas.parentElement.innerHTML="<p style='color:var(--mu);font-size:12px;padding:1rem;text-align:center'>No data.</p>";return;}
  const maxLabels={"1M":8,"3M":8,"6M":8,"1Y":12,"5Y":8};
  const step=Math.max(1,Math.floor(rawDates.length/(maxLabels[r]||8)));
  const labels=rawDates.map((d,i)=>i%step===0?formatDateLabel(d,r):"");
  const isUp=prices[prices.length-1]>=prices[0],color=isUp?G:R;
  PriceChart=new Chart(canvas,{type:"line",data:{labels,datasets:[{data:prices,borderColor:color,borderWidth:2,fill:true,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,260);g.addColorStop(0,rgba(color,.15));g.addColorStop(1,rgba(color,0));return g;},pointRadius:0,tension:.35}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:350},plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,callbacks:{title:ctx=>{const idx=ctx[0]?.dataIndex;return rawDates[idx]||"";},label:ctx=>`$${Number(ctx.raw).toFixed(2)}`}}},scales:{x:{grid:{display:false},ticks:{color:"#7e7e96",font:{size:9},maxRotation:0,autoSkip:false}},y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#7e7e96",font:{size:10},callback:v=>`$${Number(v).toFixed(2)}`}}}}});
  const diff=prices[prices.length-1]-prices[0],pct=diff/prices[0]*100,up=diff>=0;
  const el=$("pcperf");if(el){el.className=`pcperf ${up?"up":"dn"}`;el.textContent=`${up?"▲":"▼"} ${up?"+":""}$${Math.abs(diff).toFixed(2)} (${up?"+":""}${pct.toFixed(2)}%)`;}
}

function drawSectorChart(sectors){
  const el=$("sectorChart");if(!el)return;
  // FMP sector exposure returns [{sector, exposure}]
  const top=sectors.filter(s=>s.sector&&s.exposure>0).sort((a,b)=>b.exposure-a.exposure).slice(0,10);
  if(!top.length)return;
  const labels=top.map(s=>s.sector);

  new Chart(el,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:DCOLS.slice(0,data.length).map(c=>rgba(c,.85)),borderColor:"transparent",borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{position:"right",labels:{color:"#7e7e96",font:{size:10},boxWidth:10,padding:10,generateLabels:chart=>chart.data.labels.map((l,i)=>({text:`${l} ${data[i]}%`,fillStyle:DCOLS[i%DCOLS.length],strokeStyle:"transparent",index:i}))}},tooltip:{callbacks:{label:c=>`${c.label}: ${Number(c.raw).toFixed(2)}%`}}}}});

function sl(arr){const n=CurGP===0?arr.length:Math.min(CurGP,arr.length);return arr.slice(-n);}
function slY(){const y=CurFMP?.years||[];const n=CurGP===0?y.length:Math.min(CurGP,y.length);return y.slice(-n);}
function slKM(arr){const ky=CurFMP?.kmYears||[];const n=CurGP===0?ky.length:Math.min(CurGP,ky.length);return{y:ky.slice(-n),d:arr.slice(-n)};}
function setStat(id,val,chg,cls){const el=$(id);if(el)el.innerHTML=`<div class="cc-val">${val}</div><div class="cc-chg ${cls}">${chg}</div>`;}

function drawFinCharts(){
  Object.values(Charts).forEach(c=>{try{c.destroy();}catch{}});Charts={};
  const f=CurFMP;if(!f)return;
  const Y=slY(),rev=sl(f.revenue),ni=sl(f.netIncome),fcf=sl(f.freeCashFlow);
  const eps=sl(f.eps),div=sl(f.dividendPerShare),debt=sl(f.totalDebt),eq=sl(f.totalEquity);
  const gm=sl(f.grossMargin),om=sl(f.operatingMargin),nm=sl(f.netMargin),fm=sl(f.fcfMargin);
  const shares=sl(f.sharesOutstanding),netDebt=sl(f.netDebt);
  const peData=slKM(f.peRatio),roicData=slKM(f.roic);
  const revG=pctG(rev),epsG=pctG(eps),divG=pctG(div);
  const lr=last(rev),lrg=last(revG),lf=last(fcf),le=last(eps),leg=last(epsG);
  if(lr!=null)setStat("s-rv",`$${lr.toFixed(2)}B`,lrg!=null?`${sgn(lrg)}${lrg.toFixed(2)}% YoY`:"—",lrg>0?"pos":"neg");
  if(lrg!=null)setStat("s-rvg",`${sgn(lrg)}${lrg.toFixed(2)}%`,"YoY","neu");
  if(lf!=null)setStat("s-fcf",`$${lf.toFixed(2)}B`,lf>0?"Positive":"Negative",lf>0?"pos":"neg");
  if(last(fm)!=null)setStat("s-fcfm",`${last(fm).toFixed(2)}%`,"FCF / Revenue","neu");
  if(le!=null)setStat("s-eps",`$${le.toFixed(2)}`,leg!=null?`${sgn(leg)}${leg.toFixed(2)}% YoY`:"—",leg>0?"pos":"neg");
  if(leg!=null)setStat("s-epsg",`${sgn(leg)}${leg.toFixed(2)}%`,"EPS growth","neu");
  const ld=last(debt),leq=last(eq),de=ld&&leq&&leq>.001?ld/leq:null;
  setStat("s-deq",de!=null?`${de.toFixed(2)}x`:"—","D/E ratio",de!=null&&de<1?"pos":de!=null&&de<2?"neu":"neg");
  setStat("s-ni",lf!=null?`$${lf.toFixed(2)}B`:"—",lf>0?"FCF positive":"FCF negative",lf>0?"pos":"neg");
  if(div.some(x=>x>0)){const ld2=last(div),ldg=last(divG);if(ld2!=null)setStat("s-div",`$${ld2.toFixed(2)}`,ldg!=null?`${sgn(ldg)}${ldg.toFixed(2)}% YoY`:"—",ldg>0?"pos":"neu");if(ldg!=null)setStat("s-divg",`${sgn(ldg)}${ldg.toFixed(2)}%`,"growth","neu");}
  const lpe=last(peData.d),lroic=last(roicData.d),lsh=last(shares),lnd=last(netDebt);
  if(lpe!=null)setStat("s-pe",`${lpe.toFixed(1)}x`,"P/E ratio","neu");
  if(lroic!=null)setStat("s-roic",`${lroic.toFixed(2)}%`,lroic>10?"Strong":"Low",lroic>15?"pos":lroic>8?"neu":"neg");
  if(lsh!=null)setStat("s-shares",`${lsh.toFixed(2)}B`,"shares outstanding","neu");
  if(lnd!=null)setStat("s-netdebt",lnd<0?`$${Math.abs(lnd).toFixed(2)}B net cash`:`$${lnd.toFixed(2)}B net debt`,"",lnd<0?"pos":"neg");
  ["gm","om","nm","fm"].forEach((k,i)=>{const v=[gm,om,nm,fm][i];const el=$("v-"+k);if(el&&last(v)!=null)el.textContent=`${last(v).toFixed(2)}%`;});
  const bO=c=>({borderRadius:3,borderSkipped:false,backgroundColor:rgba(c,.75),hoverBackgroundColor:c});
  const lnFill=(lb,data,c)=>({label:lb,data,borderColor:c,borderWidth:2,pointRadius:2,pointBackgroundColor:c,pointHoverRadius:4,tension:.35,fill:true,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,rgba(c,.13));g.addColorStop(1,rgba(c,0));return g;}});
  const lnOnly=(lb,data,c)=>({label:lb,data,borderColor:c,borderWidth:2,pointRadius:2,pointBackgroundColor:c,pointHoverRadius:4,tension:.35,fill:false});
  const xA={grid:{display:false},ticks:{color:"#7e7e96",font:{size:9}}};
  const yA=fmt=>({grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#7e7e96",font:{size:9},callback:fmt}});
  const base={responsive:true,maintainAspectRatio:false,animation:{duration:450}};
  const mk=(id,type,data,opts)=>{const el=$(id);if(!el)return;const c=new Chart(el,{type,data,options:{...base,...opts}});Charts[id]=c;};
  mk("ch-rev","bar",{labels:Y,datasets:[{label:"Revenue",...bO(P),data:rev}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${Number(c.raw).toFixed(2)}B`}}},scales:{x:xA,y:yA(v=>`$${Number(v).toFixed(0)}B`)}});
  mk("ch-rvg","bar",{labels:Y,datasets:[{label:"Growth",data:revG,borderRadius:3,borderSkipped:false,backgroundColor:revG.map(v=>rgba(v!=null&&v>=0?G:R,.75))}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw!=null?Number(c.raw).toFixed(2):"—"}%`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}%`)}});
  mk("ch-fcf","bar",{labels:Y,datasets:[{label:"FCF",data:fcf,borderRadius:3,borderSkipped:false,backgroundColor:fcf.map(v=>rgba(v>=0?B:R,.75))}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${Number(c.raw).toFixed(2)}B`}}},scales:{x:xA,y:yA(v=>`$${Number(v).toFixed(0)}B`)}});
  mk("ch-fcfm","line",{labels:Y,datasets:[lnFill("FCF Margin",fm,B)]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${Number(c.raw).toFixed(2)}%`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}%`)}});
  mk("ch-mg","line",{labels:Y,datasets:[lnOnly("Gross",gm,G),lnOnly("Operating",om,B),lnOnly("Net",nm,P),lnOnly("FCF",fm,"#60a5fa")]},{plugins:{legend:{display:true,labels:{color:"#7e7e96",boxWidth:10,font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${Number(c.raw).toFixed(2)}%`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}%`)}});
  mk("ch-eps","bar",{labels:Y,datasets:[{label:"EPS",...bO(P),data:eps}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${Number(c.raw).toFixed(2)}`}}},scales:{x:xA,y:yA(v=>`$${Number(v).toFixed(2)}`)}});
  mk("ch-epsg","bar",{labels:Y,datasets:[{label:"Growth",data:epsG,borderRadius:3,borderSkipped:false,backgroundColor:epsG.map(v=>rgba(v!=null&&v>=0?G:R,.75))}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw!=null?Number(c.raw).toFixed(2):"—"}%`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}%`)}});
  if(div.some(x=>x>0)){mk("ch-div","bar",{labels:Y,datasets:[{label:"Div",...bO(B),data:div}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${Number(c.raw).toFixed(2)}`}}},scales:{x:xA,y:yA(v=>`$${Number(v).toFixed(2)}`)}});mk("ch-divg","bar",{labels:Y,datasets:[{label:"Growth",data:divG,borderRadius:3,borderSkipped:false,backgroundColor:divG.map(v=>rgba(v!=null&&v>=0?G:R,.75))}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw!=null?Number(c.raw).toFixed(2):"—"}%`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}%`)}});}
  mk("ch-deq","bar",{labels:Y,datasets:[{label:"Debt",...bO(R),data:debt},{label:"Equity",...bO(G),data:eq}]},{plugins:{legend:{display:true,labels:{color:"#7e7e96",boxWidth:9,font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: $${Number(c.raw).toFixed(2)}B`}}},scales:{x:xA,y:yA(v=>`$${Number(v).toFixed(0)}B`)}});
  mk("ch-ni","bar",{labels:Y,datasets:[{label:"Net Income",...bO(P),data:ni},{label:"Free CF",...bO(B),data:fcf}]},{plugins:{legend:{display:true,labels:{color:"#7e7e96",boxWidth:9,font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: $${Number(c.raw).toFixed(2)}B`}}},scales:{x:xA,y:yA(v=>`$${Number(v).toFixed(0)}B`)}});
  mk("ch-pe","line",{labels:peData.y,datasets:[lnFill("P/E",peData.d.map(v=>v!=null&&v>0&&v<200?v:null),P)]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`P/E: ${Number(c.raw).toFixed(1)}x`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(1)}x`)}});
  mk("ch-roic","line",{labels:roicData.y,datasets:[lnFill("ROIC",roicData.d.map(v=>v!=null&&v>-100&&v<500?v:null),G)]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`ROIC: ${Number(c.raw).toFixed(2)}%`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}%`)}});
  const shareTrend=last(pctG(shares));
  mk("ch-shares","line",{labels:Y,datasets:[lnFill("Shares",shares,shareTrend!=null&&shareTrend<0?G:B)]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${Number(c.raw).toFixed(3)}B`}}},scales:{x:xA,y:yA(v=>`${Number(v).toFixed(2)}B`)}});
  mk("ch-netdebt","bar",{labels:Y,datasets:[{label:"Net Debt",data:netDebt,borderRadius:3,borderSkipped:false,backgroundColor:netDebt.map(v=>rgba(v<=0?G:R,.75)),hoverBackgroundColor:netDebt.map(v=>v<=0?G:R)}]},{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${Number(c.raw)<=0?"Net Cash":"Net Debt"}: $${Math.abs(Number(c.raw)).toFixed(2)}B`}}},scales:{x:xA,y:{...yA(v=>`$${Math.abs(v).toFixed(0)}B`),ticks:{color:"#7e7e96",font:{size:9},callback:v=>Number(v)<=0?`$${Math.abs(v).toFixed(0)}B cash`:`$${Number(v).toFixed(0)}B debt`}}}});
}

function drawInsiderChart(){
  const el=$("ch-insiders");if(!el||!CurInsiders?.monthly?.length)return;
  const mo=CurInsiders.monthly;
  if(Charts["ch-insiders"]){try{Charts["ch-insiders"].destroy();}catch{}}
  Charts["ch-insiders"]=new Chart(el,{type:"bar",data:{labels:mo.map(m=>m.month),datasets:[{label:"Buys ($M)",data:mo.map(m=>m.buyValue/1e6),backgroundColor:rgba(G,.75),borderRadius:3,borderSkipped:false},{label:"Sells ($M)",data:mo.map(m=>-(m.sellValue/1e6)),backgroundColor:rgba(R,.75),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{labels:{color:"#7e7e96",boxWidth:9,font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: $${Math.abs(Number(c.raw)).toFixed(1)}M`}}},scales:{x:{grid:{display:false},ticks:{color:"#7e7e96",font:{size:9}}},y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#7e7e96",font:{size:9},callback:v=>`$${Math.abs(v).toFixed(0)}M`}}}}});
}

const FSModal=$("fs-modal");
$("fs-close").addEventListener("click",closeFS);
FSModal.addEventListener("click",e=>{if(e.target===FSModal)closeFS();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeFS();});
FSModal.querySelectorAll(".fsp-btn").forEach(btn=>{btn.addEventListener("click",()=>{FSModal.querySelectorAll(".fsp-btn").forEach(b=>b.classList.remove("on"));btn.classList.add("on");renderFSPriceChart(btn.dataset.r);});});

function openPriceFS(range){
  $("fs-title").textContent=`${CurD?.profile?.name||CurD?.ticker||""} — Price History`;
  $("fs-sub").textContent=CurD?.priceDataSource==="live"?"Live daily · FMP":"Estimated from 52W range";
  $("fs-range-wrap").style.display="flex";$("fs-perf").textContent="";
  FSModal.classList.add("open");document.body.style.overflow="hidden";
  FSModal.querySelectorAll(".fsp-btn").forEach(b=>b.classList.toggle("on",b.dataset.r===range));
  renderFSPriceChart(range);
}
function openChartFS(canvId,title,sub){
  const src=Charts[canvId];if(!src)return;
  $("fs-title").textContent=title;$("fs-sub").textContent=sub||"FMP annual data";
  $("fs-range-wrap").style.display="none";$("fs-perf").textContent="";$("fs-info").innerHTML="";
  FSModal.classList.add("open");document.body.style.overflow="hidden";
  if(FSChart){FSChart.destroy();FSChart=null;}
  try{FSChart=new Chart($("fs-canvas"),{type:src.config.type,data:src.config.data,options:{...src.config.options,responsive:true,maintainAspectRatio:false,animation:{duration:300}}});}catch(e){}
}
function closeFS(){FSModal.classList.remove("open");document.body.style.overflow="";$("fs-range-wrap").style.display="flex";if(FSChart){FSChart.destroy();FSChart=null;}}
function renderFSPriceChart(range){
  if(FSChart){FSChart.destroy();FSChart=null;}
  const canvas=$("fs-canvas");if(!canvas)return;
  const prices=CurPH?.[range]||[];const rawDates=CurDates?.[range]||[];if(!prices.length)return;
  const step=Math.max(1,Math.floor(rawDates.length/12));
  const labels=rawDates.map((d,i)=>i%step===0?formatDateLabel(d,range):"");
  const isUp=prices[prices.length-1]>=prices[0],color=isUp?G:R;
  FSChart=new Chart(canvas,{type:"line",data:{labels,datasets:[{data:prices,borderColor:color,borderWidth:2,fill:true,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,500);g.addColorStop(0,rgba(color,.16));g.addColorStop(1,rgba(color,0));return g;},pointRadius:0,tension:.35}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,callbacks:{title:ctx=>{const idx=ctx[0]?.dataIndex;return rawDates[idx]||"";},label:ctx=>`$${Number(ctx.raw).toFixed(2)}`}}},scales:{x:{grid:{display:false},ticks:{color:"#7e7e96",font:{size:10},maxRotation:0}},y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#7e7e96",font:{size:12},callback:v=>`$${Number(v).toFixed(2)}`}}}}});
  const diff=prices[prices.length-1]-prices[0],pct=diff/prices[0]*100,up=diff>=0;
  const el=$("fs-perf");if(el){el.className=`fs-perf ${up?"up":"dn"}`;el.textContent=`${up?"▲":"▼"} ${up?"+":""}$${Math.abs(diff).toFixed(2)} (${up?"+":""}${pct.toFixed(2)}%)`;}
  const m=CurD?.metrics?.metric||{};
  $("fs-info").innerHTML=`
    <div class="fs-info-item"><div class="fs-info-lbl">Current Price</div><div class="fs-info-val">${f$(CurD?.quote?.c)}</div></div>
    <div class="fs-info-item"><div class="fs-info-lbl">52W High</div><div class="fs-info-val" style="color:var(--G)">${f$(m["52WeekHigh"])}</div></div>
    <div class="fs-info-item"><div class="fs-info-lbl">52W Low</div><div class="fs-info-val" style="color:var(--R)">${f$(m["52WeekLow"])}</div></div>
    <div class="fs-info-item"><div class="fs-info-lbl">Source</div><div class="fs-info-val" style="color:${CurD?.priceDataSource==="live"?"var(--G)":"var(--B)"}">${CurD?.priceDataSource==="live"?"● FMP Live":"◎ Est. from 52W"}</div></div>
  `;
}
